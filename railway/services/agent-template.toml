# This is a TEMPLATE - copied by the orchestrator for each new user
[service]
name = "agent-template"

[build]
image = "carbon-agent-adapter:latest"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.resources]
memory = "1GB"
cpu = 1

[[deploy.variables]]
name = "USER_ID"
value = "{{USER_ID}}"

[[deploy.variables]]
name = "USER_EMAIL"
value = "{{USER_EMAIL}}"

[[deploy.variables]]
name = "USER_CONFIG"
value = "{{USER_CONFIG}}"
