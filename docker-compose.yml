services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbon_platform
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - carbon-agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - carbon-agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/carbon_platform}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
      DOCKER_NETWORK: carbon-agent-net
      AGENT_DOCKER_IMAGE: ${AGENT_DOCKER_IMAGE:-carbon-agent-adapter:latest}
      AGENT_MEMORY_LIMIT: ${AGENT_MEMORY_LIMIT:-512m}
      AGENT_CPU_NANOS: ${AGENT_CPU_NANOS:-500000000}
      ADAPTER_PORT: ${ADAPTER_PORT:-8001}
      AGENT_DOMAIN: ${AGENT_DOMAIN:-}
      TRAEFIK_ENTRYPOINT: ${TRAEFIK_ENTRYPOINT:-websecure}
      AGENT_BASE_PATH: ${AGENT_BASE_PATH:-/agent}
      ADMIN_AGENT_API_KEY: ${ADMIN_AGENT_API_KEY:-dev-admin-key}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-15}
      SESSION_MAX_LIFETIME_HOURS: ${SESSION_MAX_LIFETIME_HOURS:-24}
      SESSION_SPINUP_TIMEOUT_SECONDS: ${SESSION_SPINUP_TIMEOUT_SECONDS:-120}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      CLERK_JWT_PUBLIC_KEY: ${CLERK_JWT_PUBLIC_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - carbon-agent-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  adapter:
    build:
      context: ./adapter
      dockerfile: Dockerfile
    ports:
      - "${ADAPTER_PORT:-8001}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/carbon_platform}
      AGENT_API_URL: ${AGENT_API_URL:-http://localhost:5000}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-carbon-agent}
      AGENT_DOMAIN: ${AGENT_DOMAIN:-}
      REDIS_URL: redis://redis:6379/1
      USER_ID: ${ADAPTER_USER_ID:-}
    networks:
      - carbon-agent-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      OPENAI_API_BASE_URL: http://adapter:8000/v1
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:-sk-dev-test-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET:-dev-secret}
      CLERK_ENABLED: ${OPENWEBUI_CLERK_ENABLED:-false}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}
      ORCHESTRATOR_URL: http://orchestrator:8000
      ADAPTER_URL: http://adapter:8000
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
      DEFAULT_USER_ROLE: user
      CORS_ALLOW_ORIGIN: "*"
    networks:
      - carbon-agent-net
    depends_on:
      adapter:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    volumes:
      - openwebui:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata:
  redis_data:
  openwebui:

networks:
  carbon-agent-net:
    external: true
