services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbon_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/carbon_platform
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Railway
      RAILWAY_API_TOKEN: ${RAILWAY_API_TOKEN:-}
      RAILWAY_PROJECT_ID: ${RAILWAY_PROJECT_ID:-}
      RAILWAY_TEAM_ID: ${RAILWAY_TEAM_ID:-}
      RAILWAY_ENVIRONMENT_ID: ${RAILWAY_ENVIRONMENT_ID:-}
      # Admin
      ADMIN_AGENT_API_KEY: ${ADMIN_AGENT_API_KEY:-dev-admin-key}
      # Session
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-15}
      SESSION_MAX_LIFETIME_HOURS: ${SESSION_MAX_LIFETIME_HOURS:-24}
      # Agent
      AGENT_DOCKER_IMAGE: ${AGENT_DOCKER_IMAGE:-carbon-agent-adapter:latest}
      # Clerk Authentication
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      CLERK_JWT_PUBLIC_KEY: ${CLERK_JWT_PUBLIC_KEY:-}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      # Deployment — disable auto-create in compose; Alembic handles migrations
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  adapter:
    build:
      context: ./adapter
      dockerfile: Dockerfile
    ports:
      - "${ADAPTER_PORT:-8001}:8000"
    environment:
      # Database (shared with orchestrator)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/carbon_platform
      # Agent Zero
      AGENT_API_URL: ${AGENT_API_URL:-http://agent-zero:5000}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      # LLM
      MODEL_NAME: ${MODEL_NAME:-carbon-agent}
      # Per-user Railway routing
      RAILWAY_SERVICE_URL_TEMPLATE: ${RAILWAY_SERVICE_URL_TEMPLATE:-}
      # Adapter user ID (for standalone mode)
      USER_ID: ${ADAPTER_USER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      # OpenAI/Adapter Configuration
      OPENAI_API_BASE_URL: http://adapter:8000/v1
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:-sk-dev-test-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET:-dev-secret}

      # Clerk Integration
      CLERK_ENABLED: ${OPENWEBUI_CLERK_ENABLED:-true}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}

      # Orchestrator Integration
      ORCHESTRATOR_URL: http://orchestrator:8000
      ADAPTER_URL: http://adapter:8000

      # Feature Flags
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
      DEFAULT_USER_ROLE: user

      # CORS & Network
      CORS_ALLOW_ORIGIN: "*"
      REQUEST_TIMEOUT_SECONDS: 120
      MAX_CONCURRENT_REQUESTS: 10

    depends_on:
      - adapter
      - orchestrator
    volumes:
      - openwebui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      default:
        aliases:
          - open-webui

volumes:
  pgdata:
  redis_data:
  openwebui:

networks:
  default:
    name: carbon_platform_network
