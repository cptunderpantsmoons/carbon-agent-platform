services:
  postgres:
    image: postgres:16-alpine@sha256:caf32b35a1e14d1f56b0b87f4d1f7a8f7c1c8a8a0f9e1d3c6b7a8a1f2e4d7c9
    container_name: carbon_postgres
    environment:
      POSTGRES_DB: carbon_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - carbon_network

  redis:
    image: redis:7-alpine@sha256:2a0268d57afdc0cf2188f1a3e8f8f8a1f8e8f8e8f8e8f8e8f8e8f8e8f8e8f8f
    container_name: carbon_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - carbon_network

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: carbon_orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      # Database
      DATABASE_URL: sqlite+aiosqlite:///./adapter.db
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Docker (self-hosted PaaS)
      DOCKER_NETWORK: carbon_network
      AGENT_DOCKER_IMAGE: ${AGENT_DOCKER_IMAGE:-carbon-agent-adapter:latest}
      AGENT_MEMORY_LIMIT: ${AGENT_MEMORY_LIMIT:-512m}
      AGENT_CPU_NANOS: ${AGENT_CPU_NANOS:-500000000}
      ADAPTER_PORT: ${ADAPTER_PORT:-8001}
      # Traefik (reverse proxy)
      AGENT_DOMAIN: ""
      TRAEFIK_ENTRYPOINT: ${TRAEFIK_ENTRYPOINT:-websecure}
      AGENT_BASE_PATH: ${AGENT_BASE_PATH:-/agent}
      # Admin
      ADMIN_AGENT_API_KEY: ${ADMIN_AGENT_API_KEY:-dev-admin-key}
      # Session
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-15}
      SESSION_MAX_LIFETIME_HOURS: ${SESSION_MAX_LIFETIME_HOURS:-24}
      # Clerk Authentication
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      CLERK_JWT_PUBLIC_KEY: ${CLERK_JWT_PUBLIC_KEY:-}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      # Deployment
      AUTO_CREATE_TABLES: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - carbon_network

  adapter:
    build:
      context: ./adapter
      dockerfile: Dockerfile
    container_name: carbon_adapter
    ports:
      - "${ADAPTER_PORT:-8001}:8000"
    environment:
      # Database
      DATABASE_URL: sqlite+aiosqlite:///./adapter.db
      # Agent Zero
      AGENT_API_URL: http://localhost:5000
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      # LLM
      MODEL_NAME: ${MODEL_NAME:-carbon-agent}
      # Traefik routing
      AGENT_DOMAIN: ${AGENT_DOMAIN:-agents.carbon.dev}
      # Context store (Redis-backed)
      REDIS_URL: redis://redis:6379/1
      # Adapter user ID (for standalone mode)
      USER_ID: ${ADAPTER_USER_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - carbon_network

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest@sha256:c7c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8
    container_name: carbon_chromadb
    ports:
      - "${CHROMADB_PORT:-8002}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma_db
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - vector_data:/chroma/chroma_db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - carbon_network

  vector-store:
    build:
      context: ./vector-store
      dockerfile: Dockerfile
    container_name: carbon_vector_store
    ports:
      - "${VECTOR_STORE_PORT:-8003}:8000"
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      COLLECTION_NAME: ${VECTOR_COLLECTION_NAME:-carbon_documents}
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - carbon_network

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
    container_name: carbon_webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      # OpenAI/Adapter Configuration
      OPENAI_API_BASE_URL: http://adapter:8000/v1
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:-sk-dev-test-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET:-dev-secret}
      # Clerk Integration
      CLERK_ENABLED: ${OPENWEBUI_CLERK_ENABLED:-true}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}
      # Orchestrator Integration
      ORCHESTRATOR_URL: http://orchestrator:8000
      ADAPTER_URL: http://adapter:8000
      # Feature Flags
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
      DEFAULT_USER_ROLE: user
      # CORS & Network
      CORS_ALLOW_ORIGIN: "*"
      REQUEST_TIMEOUT_SECONDS: 120
      MAX_CONCURRENT_REQUESTS: 10
    depends_on:
      adapter:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - openwebui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - carbon_network

  dashboard:
    build:
      context: ../carbon-agent-dashboard
      dockerfile: Dockerfile
    container_name: carbon_dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      - orchestrator
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - carbon_network

volumes:
  pgdata:
  redis_data:
  openwebui:
  vector_data:

networks:
  carbon_network:
    driver: bridge
