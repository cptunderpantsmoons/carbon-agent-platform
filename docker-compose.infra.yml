# Production infrastructure compose for self-hosted PaaS
# Deploy this on your VPS alongside the main docker-compose.yml
#
# Usage:
#   docker network create carbon-agent-net
#   docker compose -f docker-compose.infra.yml up -d

services:
  # Reverse Proxy & SSL Manager (Traefik v3)
  traefik:
    image: traefik:v3.0
    command:
      # Enable Dashboard (disable in production or restrict access)
      - "--api.insecure=false"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt ACME
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-admin@carbon.dev}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - carbon-agent-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carbon_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: carbon_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - carbon-agent-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carbon_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - carbon-agent-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  letsencrypt:
  postgres_data:
  redis_data:

networks:
  carbon-agent-net:
    external: true
