services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carbon_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error - set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: carbon_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error - set REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: carbon_orchestrator_prod
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carbon_platform}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Docker
      DOCKER_NETWORK: carbon_network
      AGENT_DOCKER_IMAGE: ${AGENT_DOCKER_IMAGE}
      AGENT_MEMORY_LIMIT: ${AGENT_MEMORY_LIMIT:-512m}
      AGENT_CPU_NANOS: ${AGENT_CPU_NANOS:-500000000}
      ADAPTER_PORT: ${ADAPTER_PORT:-8001}
      # Admin
      ADMIN_AGENT_API_KEY: ${ADMIN_AGENT_API_KEY:?error - set ADMIN_AGENT_API_KEY}
      # Session
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-15}
      SESSION_MAX_LIFETIME_HOURS: ${SESSION_MAX_LIFETIME_HOURS:-24}
      # Clerk
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?error - set CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?error - set CLERK_PUBLISHABLE_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:?error - set CLERK_WEBHOOK_SECRET}
      CLERK_JWT_PUBLIC_KEY: ${CLERK_JWT_PUBLIC_KEY:-}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:?error - set CLERK_FRONTEND_API_URL}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:-}
      # RAG
      RAG_FIXED_TENANT_ID: ${RAG_FIXED_TENANT_ID:-contract-hub-tenant}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?error - set CORS_ALLOWED_ORIGINS}
      # Deployment
      AUTO_CREATE_TABLES: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adapter:
    build:
      context: ./adapter
      dockerfile: Dockerfile
    container_name: carbon_adapter_prod
    restart: always
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carbon_platform}
      # Agent Runtime (pydantic-ai + OpenAI SDK)
      AGENT_API_URL: ${AGENT_API_URL:-http://adapter:8000}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      ADMIN_AGENT_API_KEY: ${ADMIN_AGENT_API_KEY:?error - set ADMIN_AGENT_API_KEY}
      # LLM
      MODEL_NAME: ${MODEL_NAME:-carbon-agent}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4.1}
      # Traefik routing
      AGENT_DOMAIN: ${AGENT_DOMAIN:?error - set AGENT_DOMAIN}
      # Context store
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      # Adapter user ID
      USER_ID: ${ADAPTER_USER_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: carbon_chromadb_prod
    restart: always
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma_db
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - vector_data:/chroma/chroma_db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/localhost/8000 && printf \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && read -r status <&3 && [[ $$status == *200* ]]'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vector-store:
    build:
      context: ./vector-store
      dockerfile: Dockerfile
    container_name: carbon_vector_store_prod
    restart: always
    ports:
      - "127.0.0.1:8003:8000"
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_TENANT: ${CHROMA_TENANT:-default_tenant}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-default_database}
      COLLECTION_NAME: ${VECTOR_COLLECTION_NAME:-carbon_documents}
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    build:
      context: ./open-webui
      dockerfile: Dockerfile
    container_name: carbon_webui_prod
    restart: always
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      # OpenAI/Adapter Configuration
      OPENAI_API_BASE_URL: http://adapter:8000/v1
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:?error - set OPENWEBUI_API_KEY}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET:?error - set WEBUI_SECRET}
      # Clerk Integration
      CLERK_ENABLED: "true"
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?error - set CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?error - set CLERK_SECRET_KEY}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:?error - set CLERK_FRONTEND_API_URL}
      # Orchestrator Integration
      ORCHESTRATOR_URL: http://orchestrator:8000
      ADAPTER_URL: http://adapter:8000
      # Feature Flags
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
      DEFAULT_USER_ROLE: user
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:?error - set WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD:?error - set WEBUI_ADMIN_PASSWORD}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Carbon Admin}
      # CORS & Network
      CORS_ALLOW_ORIGIN: ${WEBUI_CORS_ORIGIN:?error - set WEBUI_CORS_ORIGIN}
      REQUEST_TIMEOUT_SECONDS: 120
      MAX_CONCURRENT_REQUESTS: 10
    depends_on:
      adapter:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - openwebui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ../carbon-agent-dashboard
      dockerfile: Dockerfile
    container_name: carbon_dashboard_prod
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?error - set CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?error - set CLERK_SECRET_KEY}
      NEXT_PUBLIC_HUB_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:?error - set WEBUI_ADMIN_EMAIL}
      CARBON_ORCHESTRATOR_URL: http://orchestrator:8000
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ADMIN_AGENT_ENABLED: ${ADMIN_AGENT_ENABLED:-false}
      ADMIN_AGENT_SSH_TARGET: ${ADMIN_AGENT_SSH_TARGET:-}
      ADMIN_AGENT_CONTROL_TOKEN: ${ADMIN_AGENT_CONTROL_TOKEN:-}
      ADMIN_AGENT_TIMEOUT_SECONDS: ${ADMIN_AGENT_TIMEOUT_SECONDS:-90}
      ADMIN_AGENT_REMOTE_DIR: ${ADMIN_AGENT_REMOTE_DIR:-/opt/carbon-agent-platform}
      ADMIN_AGENT_ALLOWED_SERVICES: ${ADMIN_AGENT_ALLOWED_SERVICES:-orchestrator,adapter,open-webui,dashboard,vector-store,contract-hub,contract-hub-postgres,postgres,redis,chromadb}
    depends_on:
      - orchestrator
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  contract-hub-postgres:
    image: postgres:16-alpine
    container_name: contract_hub_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: contracthub
      POSTGRES_USER: contracthub
      POSTGRES_PASSWORD: ${CONTRACT_HUB_POSTGRES_PASSWORD:?error - set CONTRACT_HUB_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${CONTRACT_HUB_POSTGRES_PORT:-5433}:5432"
    volumes:
      - contract_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracthub -d contracthub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  contract-hub:
    build:
      context: ${CONTRACT_HUB_PATH:-../contract-hub}
      dockerfile: Dockerfile
    container_name: contract_hub_prod
    restart: always
    ports:
      - "127.0.0.1:${CONTRACT_HUB_PORT:-3002}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://contracthub:${CONTRACT_HUB_POSTGRES_PASSWORD:?error - set CONTRACT_HUB_POSTGRES_PASSWORD}@contract-hub-postgres:5432/contracthub
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?error - set CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?error - set CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard
      CARBON_RAG_BASE_URL: http://orchestrator:8000
      CARBON_RAG_TENANT_ID: ${CONTRACT_HUB_TENANT_ID:?error - set CONTRACT_HUB_TENANT_ID}
      TENANT_ID: ${CONTRACT_HUB_TENANT_ID:?error - set CONTRACT_HUB_TENANT_ID}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DOCASSEMBLE_URL: ${CONTRACT_HUB_DOCASSEMBLE_URL:-}
      DOCASSEMBLE_API_KEY: ${CONTRACT_HUB_DOCASSEMBLE_API_KEY:-}
      OPENCODE_SERVER_URL: ${CONTRACT_HUB_OPENCODE_SERVER_URL:-}
      OPENCODE_API_KEY: ${CONTRACT_HUB_OPENCODE_API_KEY:-}
      NEXT_PUBLIC_APP_NAME: Contract Hub
      NEXT_PUBLIC_APP_ORG: Corporate Carbon Group Australia
      NEXT_PUBLIC_APP_DESCRIPTION: Legal Operations Platform
    depends_on:
      contract-hub-postgres:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - carbon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redis_data:
  openwebui:
  vector_data:
  contract_hub_pgdata:

networks:
  carbon_network:
    driver: bridge
