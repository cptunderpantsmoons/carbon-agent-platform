commands:
  install_orchestrator: python -m pip install -r orchestrator/requirements.txt
  install_adapter: python -m pip install -r adapter/requirements.txt
  test_orchestrator: python -m pytest orchestrator/tests/ -v
  test_adapter: python -m pytest adapter/tests/ -v
  test_integration: python -m pytest tests/integration/ -v
  test: python -m pytest orchestrator/tests/ adapter/tests/ -v
  lint: python -m pyflakes orchestrator/app adapter/app || true
  build_all: docker compose build
  compose_up: docker compose up -d
  compose_down: docker compose down -v
  migrate: docker compose exec orchestrator alembic upgrade head

services:
  postgres:
    start: docker compose up -d postgres
    stop: docker compose stop postgres
    healthcheck: docker compose exec -T postgres pg_isready -U postgres -p 5432
    port: 5432
    depends_on: []

  redis:
    start: docker compose up -d redis
    stop: docker compose stop redis
    healthcheck: docker compose exec -T redis redis-cli -p 6379 ping
    port: 6379
    depends_on: []

  orchestrator:
    start: docker compose up -d orchestrator
    stop: docker compose stop orchestrator
    healthcheck: curl -sf http://localhost:8000/health
    port: 8000
    depends_on: [postgres, redis]

  adapter:
    start: docker compose up -d adapter
    stop: docker compose stop adapter
    healthcheck: curl -sf http://localhost:8001/health
    port: 8001
    depends_on: [postgres, orchestrator]

  open-webui:
    start: docker compose up -d open-webui
    stop: docker compose stop open-webui
    healthcheck: curl -sf http://localhost:3000/health
    port: 3000
    depends_on: [orchestrator, adapter]
